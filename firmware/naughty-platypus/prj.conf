# Naughty Platypus: passive BLE observer over USB/serial console.

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Console/logging
CONFIG_PRINTK=y
CONFIG_LOG=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# Bluetooth observer role only.
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_DEVICE_NAME="NaughtyPlatypus"
CONFIG_BT_DEVICE_APPEARANCE=0

# Keep the app small and focused.
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_CENTRAL=n
CONFIG_BT_BROADCASTER=n
CONFIG_BT_HCI_HOST=y
