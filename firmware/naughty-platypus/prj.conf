# Naughty Platypus: Ubertooth-style BLE lab suite for Heltec T114 / HT-n5262 / nRF52840.
#
# This build is NOT the normal Platypus BlueZ HCI firmware.
# It appears as a USB CDC ACM serial lab instrument and streams JSON events.
#
# Safe/default tools are enabled.
# Higher-risk tools are declared but intentionally disabled / stub-only.

CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_DEVICE_NAME="Naughty Platypus"
CONFIG_BT_DEVICE_APPEARANCE=0

CONFIG_BT_BUF_EVT_RX_SIZE=255
CONFIG_BT_BUF_EVT_RX_COUNT=16

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="naughty-platypus> "

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=2

# Optional Heltec T114 ST7789V boot splash.
# The application still boots and scans when the display is absent or not ready.
CONFIG_GPIO=y
CONFIG_DISPLAY=y
CONFIG_ST7789V=y
CONFIG_NP_BOOT_SPLASH=y

# Safe/default lab tools.
CONFIG_NP_ENABLE_PASSIVE_SURVEY=y
CONFIG_NP_ENABLE_ADV_ANALYZER=y
CONFIG_NP_ENABLE_RSSI_SURVEY=y

# Restricted placeholders. These intentionally remain disabled.
# Purple activation docs are in docs/manual-activation-map.html.
CONFIG_NP_ENABLE_CHANNEL_SURVEY_PLACEHOLDER=y
CONFIG_NP_ENABLE_BLE_CONNECTION_FOLLOW_PLACEHOLDER=y
CONFIG_NP_ENABLE_BLE_GATT_MUTATION_PLACEHOLDER=y
CONFIG_NP_ENABLE_BLE_PAIRING_LAB_PLACEHOLDER=y
CONFIG_NP_ENABLE_BLE_ADV_TX_PLACEHOLDER=y
CONFIG_NP_ENABLE_BLE_STABILITY_STRESS_PLACEHOLDER=y
# CONFIG_NP_ENABLE_CLASSIC_BT_PLACEHOLDER is not set
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
